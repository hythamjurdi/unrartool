name: Build & Push to Docker Hub

on:
  push:
    branches:
      - main
    tags:
      - "v*"          # triggers on v1.0.0, v1.2.3, etc.
  pull_request:
    branches:
      - main          # builds (but doesn't push) on PRs for validation

env:
  IMAGE_NAME: rarunpacker   # becomes yourdockerhubuser/rarunpacker

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up QEMU for multi-arch builds (arm64 for Unraid on ARM, amd64 for standard)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3. Set up Docker Buildx (enables multi-platform builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Log in to Docker Hub (only on push to main/tags, not PRs)
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Generate image tags:
      #    - main branch  → :latest
      #    - v1.2.3 tag   → :1.2.3 and :latest
      #    - PR           → :pr-42 (not pushed)
      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=pr

      # 6. Build and push
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64    # covers Unraid on both CPU types
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha                  # GitHub Actions cache speeds up rebuilds
          cache-to: type=gha,mode=max

      # 7. Update Docker Hub description from README.md
      - name: Update Docker Hub description
        if: github.event_name != 'pull_request'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          readme-filepath: ./README.md
