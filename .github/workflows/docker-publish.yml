name: Build & Push to Docker Hub

on:
  push:
    branches:
      - main
    tags:
      - "v*"           # triggers on v1.0.0, v1.2.3, etc.
  pull_request:
    branches:
      - main           # builds but does NOT push on PRs

env:
  IMAGE_NAME: unrartool

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Generates tags AND standard OCI labels automatically:
      #   - main branch push  → :latest
      #   - v1.2.3 tag        → :1.2.3, :1.2, :latest
      #   - PR                → :pr-42 (not pushed)
      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=pr
          labels: |
            org.opencontainers.image.title=UnrarTool
            org.opencontainers.image.description=Automated split-RAR extractor with a modern web UI for Unraid
            org.opencontainers.image.url=https://github.com/hythamjurdi/unrartool
            org.opencontainers.image.source=https://github.com/hythamjurdi/unrartool

      # Inject build date, version, and git SHA as build args
      # so the Dockerfile can bake them into OCI labels.
      # Unraid reads these labels to display version info.
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VERSION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.version'] }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        if: github.event_name != 'pull_request'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          readme-filepath: ./README.md
