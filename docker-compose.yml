services:
  unrartool:
    image: hythamjurdi/unrartool:latest
    container_name: unrartool
    restart: unless-stopped

    ports:
      - "8080:8080"       # Change the left number to use a different host port

    volumes:
      # ── Add your own paths here ───────────────────────────────────────────
      # Mount any folder you want to browse/extract from. You can add as many
      # as you need. The file browser shows everything under DATA_PATH.
      # Example:
      #   - /mnt/user/downloads:/data/downloads
      #   - /mnt/user/data:/data/data
      - /mnt/user/downloads:/data/downloads

      # ── Persistent config + database ─────────────────────────────────────
      - /mnt/user/appdata/unrartool:/config

    environment:
      DATA_PATH: /data      # Root path shown in the file browser
      CONFIG_PATH: /config  # Where the database and settings are stored

    # Uncomment to set file ownership (Unraid default: 99:100)
    # user: "99:100"

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
